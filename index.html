// CAREGIVER UPDATE
// ══════════════════════════════════════════════════════════════════════════════
function CaregiverScreen({ days, phase, checkins, wins, checked, romLog, onBack }) {
  const today = new Date().toDateString();
  const todayCI = checkins.find(c => c.date === today);
  const recent7 = checkins.slice(-7);
  const latestRom = romLog.length ? romLog[romLog.length - 1] : null;
  const romTarget = ROM_CONFIG.phaseTargets[phase.id] || ROM_CONFIG.phaseTargets[5];
  const doneGoals = phase.goals.filter((_,i) => checked[`${phase.id}-${i}`]);
  const recentWins = wins.slice(-5);
  const readiness = calcReadiness(checkins, checked, phase);

  const [include, setInclude] = useState({
    checkin: true,
    readiness: true,
    rom: !!latestRom,
    goals: true,
    wins: recentWins.length > 0,
    phase: true,
  });
  const [caregiverName, setCaregiverName] = useState(() => loadRaw("ax_caregiver_name", ""));
  const [copied, setCopied] = useState(false);

  const toggle = (key) => setInclude(s => ({...s, [key]: !s[key]}));
  const saveName = (v) => { setCaregiverName(v); saveRaw("ax_caregiver_name", v); };

  const buildMessage = () => {
    const lines = [];
    const greeting = caregiverName ? `Hi ${caregiverName} —` : "Recovery update —";
    lines.push(`${greeting} Day ${days} post-op update.\n`);

    if (include.phase) {
      lines.push(`📍 Phase: ${phase.name} (${phase.weeks})`);
    }

    if (include.readiness && readiness) {
      lines.push(`\n⚡ Recovery Readiness: ${readiness.total}/100 — ${readiness.label}`);
      lines.push(`${readiness.advice}`);
    }

    if (include.checkin && todayCI) {
      lines.push(`\n📋 Today's Check-in`);
      lines.push(`Pain: ${todayCI.pain}/10`);
      lines.push(`Swelling: ${todayCI.swelling}`);
      lines.push(`Mood: ${todayCI.mood}`);
    } else if (include.checkin && !todayCI) {
      lines.push(`\n📋 No check-in logged yet today.`);
    }

    if (include.rom && latestRom) {
      lines.push(`\n📐 Range of Motion (${latestRom.date})`);
      ROM_CONFIG.sides.forEach(side => {
        const val = latestRom.vals?.[side] ?? latestRom[side.toLowerCase()] ?? 0;
        const pct = Math.min(100, Math.round((val / romTarget) * 100));
        lines.push(`${side} ${ROM_CONFIG.joint}: ${val}${ROM_CONFIG.unit} (${pct}% of ${romTarget}${ROM_CONFIG.unit} target)`);
      });
    }

    if (include.goals) {
      const total = phase.goals.length;
      lines.push(`\n✅ Phase Goals: ${doneGoals.length}/${total} complete`);
      if (doneGoals.length > 0) {
        doneGoals.slice(-3).forEach(g => lines.push(`  · ${g}`));
        if (doneGoals.length > 3) lines.push(`  · ...and ${doneGoals.length - 3} more`);
      }
    }

    if (include.wins && recentWins.length > 0) {
      lines.push(`\n🏆 Recent Wins`);
      recentWins.slice(-3).forEach(w => lines.push(`  · ${w.text}`));
    }

    lines.push(`\n— Sent from APEXRX`);
    return lines.join("\n");
  };

  const message = buildMessage();
  const encoded = encodeURIComponent(message);

  const copyMsg = () => {
    navigator.clipboard?.writeText(message).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };

  const OPTIONS = [
    { key:"phase",     label:"Current Phase",       available: true },
    { key:"readiness", label:"Readiness Score",      available: !!readiness },
    { key:"checkin",   label:"Today's Check-in",     available: true },
    { key:"rom",       label:"Range of Motion",      available: !!latestRom },
    { key:"goals",     label:"Phase Goals Progress", available: true },
    { key:"wins",      label:"Recent Wins",          available: recentWins.length > 0 },
  ];

  return (
    <div style={{ minHeight:"100vh", background:C.black, color:C.white, fontFamily:cor }}>
      <div style={{ padding:"14px 14px 80px", maxWidth:640, margin:"0 auto" }}>
        <Ghost onClick={onBack} style={{ marginBottom:"14px" }}>← Back</Ghost>

        <Card border={`${C.goldMid}60`} bg={`${C.blue}15`}>
          <div style={{ fontFamily:bb, fontSize:"24px", letterSpacing:"3px", color:C.goldBright, marginBottom:"4px" }}>💬 Caregiver Update</div>
          <div style={{ fontFamily:cor, fontSize:"14px", fontStyle:"italic", color:C.ash, lineHeight:"1.6" }}>
            Send your partner a clear, structured update — what's been done, where things stand, how you're doing.
          </div>
        </Card>

        {/* Caregiver name */}
        <Card>
          <Lbl>Caregiver's Name</Lbl>
          <Inp value={caregiverName} onChange={e => saveName(e.target.value)} placeholder="e.g. Sarah, Mom, Coach..." />
        </Card>

        {/* Choose what to include */}
        <Card>
          <Lbl>Include in Message</Lbl>
          {OPTIONS.map(opt => (
            <div key={opt.key} onClick={() => opt.available && toggle(opt.key)}
              style={{ display:"flex", alignItems:"center", gap:"12px", padding:"10px 0",
                borderBottom:`1px solid ${C.iron}`, cursor:opt.available?"pointer":"default",
                opacity:opt.available?1:0.4 }}>
              <div style={{ width:"20px", height:"20px", borderRadius:"3px", flexShrink:0,
                border:`1.5px solid ${include[opt.key]&&opt.available?C.goldBright:C.steel}`,
                background:include[opt.key]&&opt.available?C.goldBright:"transparent",
                display:"flex", alignItems:"center", justifyContent:"center",
                fontSize:"11px", color:C.black }}>
                {include[opt.key] && opt.available && "✓"}
              </div>
              <div style={{ flex:1 }}>
                <div style={{ fontFamily:bar, fontSize:"13px", letterSpacing:"1px", color:include[opt.key]&&opt.available?C.white:C.ash, textTransform:"uppercase" }}>{opt.label}</div>
                {!opt.available && <div style={{ fontFamily:cor, fontSize:"11px", fontStyle:"italic", color:C.steel, marginTop:"2px" }}>No data yet</div>}
              </div>
            </div>
          ))}
        </Card>

        {/* Message preview */}
        <Card border={`${C.iron}`} bg={C.char}>
          <Lbl mb={10}>Message Preview</Lbl>
          <div style={{ fontFamily:cor, fontSize:"14px", color:C.bone, lineHeight:"1.8", whiteSpace:"pre-wrap" }}>{message}</div>
        </Card>

        {/* Send actions */}
        <Btn
          onClick={() => { window.location.href = `sms:&body=${encoded}`; }}
          full bg={C.goldBright} color={C.black}
          style={{ fontSize:"13px", marginBottom:"8px" }}
        >
          📱 Open in Messages
        </Btn>
        <Btn
          onClick={copyMsg}
          full bg={copied ? C.greenLight : C.steel} color={C.white}
          style={{ fontSize:"13px" }}
        >
          {copied ? "✓ Copied to Clipboard!" : "📋 Copy Text"}
        </Btn>

        <div style={{ fontFamily:cor, fontSize:"12px", fontStyle:"italic", color:C.ash, textAlign:"center", marginTop:"12px", lineHeight:"1.8" }}>
          "Open in Messages" works on iPhone once deployed.<br/>
          "Copy Text" works everywhere — paste into any app.
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// TRAVEL
// ══════════════════════════════════════════════════════════════════════════════
function TravelScreen({ days }) {
  const phase = getPhase(days);
  const [trips, setTrips] = useState(() => load("ax_trips_v2",[]));
  const [name, setName] = useState(""); const [date, setDate] = useState("");
  const add = () => {
    if (!name.trim()||!date) return;
    const d=new Date(date+"T12:00:00"), off=Math.round((d-SURGERY_DATE)/86400000);
    const p=getPhase(Math.max(0,off));
    const t={id:Date.now(),name:name.trim(),date,offset:off,phaseId:p.id,phaseName:p.name,risk:p.travelRisk,note:p.travelNote};
    const u=[...trips,t].sort((a,b)=>a.date.localeCompare(b.date)); setTrips(u); save("ax_trips_v2",u); setName(""); setDate("");
  };
  const del = (id) => { const u=trips.filter(t=>t.id!==id); setTrips(u); save("ax_trips_v2",u); };
  return (
    <div style={{ padding:"14px 14px 80px", maxWidth:640, margin:"0 auto" }}>
      <Card border={`${RISK_COLOR[phase.travelRisk]}60`} bg={`${C.blue}15`}>
        <Lbl>Current Travel Status</Lbl>
        <div style={{ fontFamily:bb, fontSize:"28px", letterSpacing:"3px", color:RISK_COLOR[phase.travelRisk], marginBottom:"8px" }}>{RISK_LABEL[phase.travelRisk]}</div>
        <div style={{ fontFamily:cor, fontSize:"14px", fontStyle:"italic", color:C.bone, lineHeight:"1.6" }}>{phase.travelNote}</div>
      </Card>
      <Card>
        <Lbl>Phase-by-Phase Guide</Lbl>
        {PHASES.map((p,i) => (
          <div key={p.id} style={{ display:"flex", gap:"10px", padding:"10px 0", borderBottom:i<PHASES.length-1?`1px solid ${C.iron}`:"none" }}>
            <div style={{ width:"8px", height:"8px", borderRadius:"50%", background:RISK_COLOR[p.travelRisk], marginTop:"5px", flexShrink:0 }}/>
            <div>
              <div style={{ display:"flex", justifyContent:"space-between" }}>
                <span style={{ fontFamily:bb, fontSize:"15px", letterSpacing:"1px", color:p.id===phase.id?C.goldBright:C.bone }}>{p.icon} {p.name}</span>
                <span style={{ fontFamily:bar, fontSize:"9px", color:C.steel, textTransform:"uppercase" }}>{p.weeks}</span>
              </div>
              <div style={{ fontFamily:cor, fontSize:"12px", fontStyle:"italic", color:C.ash, marginTop:"3px", lineHeight:"1.5" }}>{p.travelNote}</div>
            </div>
          </div>
        ))}
      </Card>
      <Card>
        <Lbl>Plan a Work Trip</Lbl>
        <Inp value={name} onChange={e=>setName(e.target.value)} placeholder="Trip name (e.g. Holzer Health — Gallipolis, OH)" style={{ marginBottom:"8px" }}/>
        <Inp type="date" value={date} onChange={e=>setDate(e.target.value)} style={{ marginBottom:"10px", colorScheme:"dark" }}/>
        <Btn onClick={add} full>+ Add Trip</Btn>
      </Card>
      {trips.length > 0 && (
        <Card>
          <Lbl>Planned Trips</Lbl>
          {trips.map(t => {
            const rc=RISK_COLOR[t.risk], wk=Math.floor(t.offset/7);
            return (
              <div key={t.id} style={{ border:`1px solid ${rc}40`, borderRadius:"3px", padding:"12px", marginBottom:"8px", background:`${rc}08` }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                  <div>
                    <div style={{ fontFamily:bb, fontSize:"18px", letterSpacing:"2px", color:C.white }}>{t.name}</div>
                    <div style={{ fontFamily:bar, fontSize:"10px", letterSpacing:"1px", color:C.ash, marginTop:"2px", textTransform:"uppercase" }}>{fmtDate(new Date(t.date+"T12:00:00"))} · Wk {wk} · {t.phaseName}</div>
                  </div>
                  <button onClick={() => del(t.id)} style={{ background:"transparent", border:"none", color:C.steel, cursor:"pointer", fontSize:"20px" }}>×</button>
                </div>
                <div style={{ fontFamily:bb, fontSize:"16px", letterSpacing:"2px", color:rc, marginTop:"8px" }}>{RISK_LABEL[t.risk]}</div>
                <div style={{ fontFamily:cor, fontSize:"12px", fontStyle:"italic", color:C.ash, marginTop:"4px", lineHeight:"1.5" }}>{t.note}</div>
              </div>
            );
          })}
        </Card>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// ROOT
// ══════════════════════════════════════════════════════════════════════════════
function App() {
  const days = daysSince();
  const phase = getPhase(days);
  const [tab, setTab] = useState("home");
  const [screen, setScreen] = useState(null);
  const [checked, setChecked] = useState(() => load("ax_checked_v2",{}));
  const [notes, setNotes] = useState(() => load("ax_notes_v2",{}));
  const [checkins, setCheckins] = useState(() => load("ax_checkins_v2",[]));
  const [wins, setWins] = useState(() => load("ax_wins_v2",[]));

  const onCheck = (pid, idx) => {
    const k=`${pid}-${idx}`, u={...checked,[k]:!checked[k]};
    setChecked(u); save("ax_checked_v2",u);
    if (!checked[k]) {
      const g=PHASES.find(p=>p.id===pid)?.goals[idx];
      if (g) { const wu=[...wins,{text:g,day:days,date:new Date().toDateString()}]; setWins(wu); save("ax_wins_v2",wu); }
    }
  };
  const onSaveNote = (pid,text) => { const u={...notes,[pid]:text}; setNotes(u); save("ax_notes_v2",u); };
  const onCheckin = (ci) => { const u=[...checkins,ci]; setCheckins(u); save("ax_checkins_v2",u); };
  const onAddWin = (w) => { const u=[...wins,w]; setWins(u); save("ax_wins_v2",u); };

  const TABS = [
    { id:"home",     emoji:"🏠", label:"Home" },
    { id:"recovery", emoji:"🛡️",label:"Recover" },
    { id:"meds",     emoji:"💊", label:"Meds" },
    { id:"pt",       emoji:"🤲", label:"PT" },
    { id:"why",      emoji:"❤️", label:"Why" },
    { id:"support",  emoji:null, label:"Support" },
  ];

  const [romLog, setRomLog] = useState(() => load("ax_rom_v2", []));

  if (screen==="wins") return <div style={{ minHeight:"100vh", background:C.black, color:C.white, fontFamily:cor }}><WinWallScreen wins={wins} checkins={checkins} onAddWin={onAddWin} onBack={()=>setScreen(null)}/></div>;
  if (screen==="caregiver") return <CaregiverScreen days={days} phase={phase} checkins={checkins} wins={wins} checked={checked} romLog={romLog} onBack={()=>setScreen(null)}/>;
  if (screen==="travel") return <div style={{ minHeight:"100vh", background:C.black, color:C.white, fontFamily:cor }}><div style={{ padding:"14px 14px 0", maxWidth:640, margin:"0 auto" }}><Ghost onClick={()=>setScreen(null)} style={{ marginBottom:"4px" }}>← Back</Ghost></div><TravelScreen days={days}/></div>;
  if (screen==="normal") return <div style={{ minHeight:"100vh", background:C.black, color:C.white, fontFamily:cor }}><div style={{ padding:"14px 14px 0", maxWidth:640, margin:"0 auto" }}><Ghost onClick={()=>setScreen(null)} style={{ marginBottom:"4px" }}>← Back</Ghost></div><NormalScreen/></div>;

  return (
    <div style={{ minHeight:"100vh", background:C.black, color:C.white, fontFamily:cor }}>
      {/* Top bar */}
      <div style={{ position:"sticky", top:0, zIndex:30, background:C.obs, borderBottom:`1px solid ${C.iron}`, padding:"11px 16px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
        <div style={{ display:"flex", alignItems:"center", gap:"10px" }}>
          <Mark s={26}/>
          <div>
            <div style={{ fontFamily:bb, fontSize:"20px", letterSpacing:"4px", lineHeight:1 }}>
              <span style={{ color:C.white }}>APEX</span><span style={{ color:C.goldBright }}>RX</span>
            </div>
            <div style={{ fontFamily:bar, fontSize:"8px", letterSpacing:"3px", color:C.steel, textTransform:"uppercase" }}>v2.2</div>
          </div>
        </div>
        <div style={{ textAlign:"right" }}>
          <div style={{ fontFamily:bb, fontSize:"22px", letterSpacing:"2px", color:C.goldBright, lineHeight:1 }}>Day {days}</div>
          <div style={{ fontFamily:bar, fontSize:"8px", letterSpacing:"2px", color:C.goldMid, textTransform:"uppercase" }}>{phase.icon} {phase.name}</div>
        </div>
      </div>

      {tab==="home"     && <HomeScreen days={days} phase={phase} checkins={checkins} wins={wins} checked={checked} onCheckin={onCheckin} onNav={setScreen}/>}
      {tab==="recovery" && <RecoveryScreen days={days} checked={checked} onCheck={onCheck} notes={notes} onSaveNote={onSaveNote}/>}
      {tab==="meds"     && <MedsScreen/>}
      {tab==="pt"       && <PTScreen days={days} checkins={checkins} checked={checked} wins={wins}/>}
      {tab==="why"      && <WhyScreen wins={wins} days={days} phase={phase} checkins={checkins} checked={checked}/>}
      {tab==="support"  && <SupportScreen/>}

      {/* Bottom nav */}
      <div style={{ position:"fixed", bottom:0, left:0, right:0, zIndex:30, background:C.obs, borderTop:`1px solid ${C.iron}`, display:"flex", paddingBottom:"env(safe-area-inset-bottom,0px)" }}>
        {TABS.map(t => {
          const active = tab === t.id;
          const ic = active ? (t.id==="support"?C.blueLight:C.goldBright) : C.ash;
          return (
            <button key={t.id} onClick={() => setTab(t.id)} style={{ flex:1, padding:"10px 1px 9px", background:"transparent", border:"none", borderTop:`2px solid ${active?(t.id==="support"?C.blueLight:C.goldBright):"transparent"}`, cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:"3px" }}>
              {t.emoji ? <span style={{ fontSize:"17px", lineHeight:1 }}>{t.emoji}</span> : <Caduceus size={19} color={ic}/>}
              <span style={{ fontFamily:bar, fontSize:"8px", letterSpacing:"1px", textTransform:"uppercase", color:active?(t.id==="support"?C.blueLight:C.goldBright):C.steel }}>{t.label}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
