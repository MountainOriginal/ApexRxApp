// ── READINESS SCORE ───────────────────────────────────────────────────────────
function calcReadiness(checkins, checked, phase) {
  const recent = checkins.slice(-7);
  if (recent.length === 0) return null;
  const avgPain = recent.reduce((a,c) => a + c.pain, 0) / recent.length;
  const painScore = Math.round(((10 - avgPain) / 9) * 40);
  const swellMap = { better:1, same:0.5, worse:0 };
  const swellScore = Math.round((recent.reduce((a,c) => a + (swellMap[c.swelling]||0.5), 0) / recent.length) * 20);
  const done = phase.goals.filter((_,i) => checked[`${phase.id}-${i}`]).length;
  const goalScore = phase.goals.length > 0 ? Math.round((done / phase.goals.length) * 20) : 10;
  const moodMap = { great:1, ok:0.65, rough:0.35, bad:0 };
  const moodScore = Math.round((recent.reduce((a,c) => a + (moodMap[c.mood]||0.5), 0) / recent.length) * 20);
  const total = Math.min(100, painScore + swellScore + goalScore + moodScore);
  let label, color, advice;
  if (total >= 80) { label="Peak Readiness"; color=C.greenLight; advice="Push day. Your body is responding well — lean into your goals."; }
  else if (total >= 60) { label="Building Momentum"; color=C.goldBright; advice="Solid foundation. Stay consistent and trust the process."; }
  else if (total >= 40) { label="Active Recovery"; color=C.warnLight; advice="Rest day signals. Prioritize ice, elevation, and sleep tonight."; }
  else { label="Rest & Recover"; color=C.redLight; advice="Your body is asking for a break. That's not failure — it's data."; }
  return { total, label, color, advice, painScore, swellScore, goalScore, moodScore };
}

// ── CLAUDE API ────────────────────────────────────────────────────────────────
async function callClaude(prompt) {
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:800, messages:[{ role:"user", content:prompt }] })
    });
    const data = await res.json();
    return data.content?.[0]?.text || "No response returned.";
  } catch(e) {
    return "AI reports are available once deployed to GitHub Pages. Your check-in data is being saved now.";
  }
}

function HomeScreen({ days, phase, checkins, wins, checked, onCheckin, onNav }) {

  const recentWins = wins.slice(-3).reverse();

  const recent7 = checkins.slice(-7);
  const avgPain7 = recent7.length ? recent7.reduce((a,c) => a+c.pain, 0)/recent7.length : 5;
  const pool = QUOTES.filter(q => q.phase === phase.id || q.phase === "all");
  const tonePool = pool.filter(q => q.tone === (avgPain7 >= 7 ? "warm" : "gritty"));
  const activePool = tonePool.length ? tonePool : pool;
  const quote = activePool[days % activePool.length];

  const lastCI = checkins.length ? checkins[checkins.length-1] : null;
  const daysSinceCI = lastCI ? Math.floor((new Date() - new Date(lastCI.date)) / 86400000) : 999;

  const getResp = (p,s,m) => {

    if (s === "worse") return { msg:"Increased swelling — prioritize elevation today.", color:C.warnLight };
    return { msg:"Solid day. Keep doing what you're doing. Consistency wins.", color:C.goldBright };
  };

        <div style={{ fontFamily:bb, fontSize:"clamp(48px,12vw,72px)", letterSpacing:"4px", color:C.goldBright, lineHeight:1, position:"relative", zIndex:1 }}>{days}</div>
        <div style={{ fontFamily:bar, fontSize:"11px", letterSpacing:"4px", color:C.ash, textTransform:"uppercase", marginTop:"2px", position:"relative", zIndex:1 }}>Days Post-Op</div>
        <div style={{ fontFamily:bar, fontSize:"10px", letterSpacing:"2px", color:C.goldMid, textTransform:"uppercase", marginTop:"8px", position:"relative", zIndex:1 }}>{phase.icon} {phase.name} · {weeks}w {xd}d</div>
        <div style={{ height:"3px", background:C.iron, borderRadius:"2px", marginTop:"14px", overflow:"hidden", position:"relative", zIndex:1 }}>
          <div style={{ width:`${pct}%`, height:"100%", background:`linear-gradient(90deg,${C.gold},${C.goldBright})` }}/>
        </div>
        <div style={{ display:"flex", justifyContent:"space-between", fontFamily:bar, fontSize:"9px", color:C.steel, marginTop:"4px", letterSpacing:"1px", position:"relative", zIndex:1 }}>
          <span>Day 0</span><span style={{ color:C.goldBright }}>{Math.round(pct)}%</span><span>Day 365</span>
        </div>
      </div>

      {/* Readiness score */}
      {readiness && (
        <Card border={`${readiness.color}60`}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:"10px" }}>
            <div>
              <Lbl color={readiness.color} mb={4}>Recovery Readiness</Lbl>
              <div style={{ fontFamily:bb, fontSize:"42px", letterSpacing:"2px", color:readiness.color, lineHeight:1 }}>{readiness.total}</div>
              <div style={{ fontFamily:bar, fontSize:"11px", letterSpacing:"2px", color:readiness.color, textTransform:"uppercase", marginTop:"4px" }}>{readiness.label}</div>
            </div>
            <div style={{ textAlign:"right" }}>
              {[{l:"Pain",v:readiness.painScore,max:40},{l:"Swelling",v:readiness.swellScore,max:20},{l:"Goals",v:readiness.goalScore,max:20},{l:"Mood",v:readiness.moodScore,max:20}].map(r => (
                <div key={r.l} style={{ display:"flex", alignItems:"center", gap:"6px", marginBottom:"4px", justifyContent:"flex-end" }}>
                  <span style={{ fontFamily:bar, fontSize:"9px", letterSpacing:"1px", color:C.ash, textTransform:"uppercase" }}>{r.l}</span>
                  <div style={{ width:"50px", height:"4px", background:C.iron, borderRadius:"2px", overflow:"hidden" }}>
                    <div style={{ width:`${(r.v/r.max)*100}%`, height:"100%", background:readiness.color }}/>
                  </div>
                  <span style={{ fontFamily:bar, fontSize:"9px", color:readiness.color, width:"22px", textAlign:"right" }}>{r.v}</span>
                </div>
              ))}
            </div>
          </div>
          <div style={{ fontFamily:cor, fontSize:"13px", fontStyle:"italic", color:C.bone, lineHeight:"1.6", borderLeft:`3px solid ${readiness.color}`, paddingLeft:"12px" }}>{readiness.advice}</div>
          {recent7.length < 3 && <div style={{ fontFamily:bar, fontSize:"9px", letterSpacing:"1px", color:C.steel, marginTop:"8px", textTransform:"uppercase" }}>Log 3+ check-ins for a full score</div>}
        </Card>
      )}

      {/* Check-in */}
      {!todayCI ? (
        <Card border={`${C.goldMid}60`} bg={`${C.blue}20`}>
          <Lbl>How Are You Doing Today?</Lbl>
          <div style={{ marginBottom:"16px" }}>
            <div style={{ fontFamily:bar, fontSize:"11px", letterSpacing:"2px", color:C.ash, textTransform:"uppercase", marginBottom:"10px" }}>Pain Level · {pain}/10</div>
            <input type="range" min="1" max="10" value={pain} onChange={e => setPain(Number(e.target.value))} style={{ width:"100%", accentColor:pain>=7?C.redLight:pain>=4?C.warnLight:C.greenLight, height:"6px", cursor:"pointer" }}/>
            <div style={{ display:"flex", justifyContent:"space-between", fontFamily:bar, fontSize:"9px", color:C.ash, marginTop:"4px" }}><span>1 · None</span><span>5 · Moderate</span><span>10 · Severe</span></div>
          </div>
          <div style={{ marginBottom:"16px" }}>
            <div style={{ fontFamily:bar, fontSize:"11px", letterSpacing:"2px", color:C.ash, textTransform:"uppercase", marginBottom:"8px" }}>Swelling</div>
            <div style={{ display:"flex", gap:"8px" }}>
              {swOpts.map(o => (
                <div key={o.v} onClick={() => setSwelling(o.v)} style={{ flex:1, textAlign:"center", padding:"10px 4px", borderRadius:"3px", border:`1px solid ${swelling===o.v?C.goldMid:C.iron}`, background:swelling===o.v?`${C.goldDeep}30`:C.char, cursor:"pointer" }}>
                  <div style={{ fontSize:"18px" }}>{o.icon}</div>
                  <div style={{ fontFamily:bar, fontSize:"9px", letterSpacing:"1px", color:swelling===o.v?C.goldBright:C.ash, marginTop:"4px", textTransform:"uppercase" }}>{o.label}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={{ marginBottom:"16px" }}>
            <div style={{ fontFamily:bar, fontSize:"11px", letterSpacing:"2px", color:C.ash, textTransform:"uppercase", marginBottom:"8px" }}>Mood</div>
            <div style={{ display:"flex", gap:"8px" }}>
              {moods.map(m => (
                <div key={m.v} onClick={() => setMood(m.v)} style={{ flex:1, textAlign:"center", padding:"10px 4px", borderRadius:"3px", border:`1px solid ${mood===m.v?C.goldMid:C.iron}`, background:mood===m.v?`${C.goldDeep}30`:C.char, cursor:"pointer" }}>
                  <div style={{ fontSize:"20px" }}>{m.icon}</div>
                  <div style={{ fontFamily:bar, fontSize:"9px", letterSpacing:"1px", color:mood===m.v?C.goldBright:C.ash, marginTop:"4px", textTransform:"uppercase" }}>{m.label}</div>
                </div>
              ))}
            </div>
          </div>
          <Btn onClick={() => { if(mood) onCheckin({ date:today, pain, swelling, mood, day:days }); }} full bg={mood?C.goldBright:C.steel} color={C.black} style={{ opacity:mood?1:0.5 }}>Log Today</Btn>
        </Card>
      ) : (
        <Card border={`${C.greenLight}50`} bg={`${C.green}15`}>
          <div style={{ display:"flex", gap:"12px", alignItems:"flex-start" }}>
            <div style={{ fontSize:"28px" }}>✅</div>
            <div style={{ flex:1 }}>
              <div style={{ fontFamily:bb, fontSize:"18px", letterSpacing:"2px", color:C.greenLight }}>Day {days} Logged</div>
              <div style={{ fontFamily:bar, fontSize:"10px", letterSpacing:"2px", color:C.ash, marginTop:"2px", textTransform:"uppercase" }}>Pain {todayCI.pain}/10 · Swelling {todayCI.swelling} · {todayCI.mood}</div>
              {resp && <div style={{ fontFamily:cor, fontSize:"14px", fontStyle:"italic", color:resp.color, marginTop:"10px", lineHeight:"1.6", borderLeft:`3px solid ${resp.color}`, paddingLeft:"12px" }}>{resp.msg}</div>}
            </div>
          </div>
        </Card>
      )}

      {/* Quote */}
      <Card border={`${C.goldDeep}80`} bg={`${C.blue}15`}>
        <div style={{ fontFamily:cor, fontSize:"17px", fontStyle:"italic", color:C.white, lineHeight:"1.7", marginBottom:"10px" }}>"{quote?.text}"</div>
        <div style={{ fontFamily:bar, fontSize:"9px", letterSpacing:"2px", color:C.goldMid, textTransform:"uppercase" }}>— APEXRX · Day {days}</div>
      </Card>

      {/* Recent wins */}
      {recentWins.length > 0 && (
        <Card>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"10px" }}>
            <Lbl mb={0}>Recent Wins</Lbl>
            <Ghost onClick={() => onNav("wins")} color={C.goldMid}>All Wins →</Ghost>
          </div>
          {recentWins.map((w,i) => (
            <div key={i} style={{ display:"flex", gap:"10px", padding:"8px 0", borderBottom:i<recentWins.length-1?`1px solid ${C.iron}`:"none", alignItems:"flex-start" }}>
              <span style={{ color:C.goldBright, fontSize:"14px", flexShrink:0 }}>🏆</span>
              <div>
                <div style={{ fontFamily:cor, fontSize:"14px", color:C.bone, lineHeight:"1.4" }}>{w.text}</div>
                <div style={{ fontFamily:bar, fontSize:"9px", letterSpacing:"1px", color:C.steel, marginTop:"3px" }}>Day {w.day}</div>
              </div>
            </div>
          ))}
        </Card>
      )}

      {/* Quick nav */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"8px" }}>
        {[
          { icon:"✈️", label:"Travel Check",    screen:"travel",    color:C.blueLight },
          { icon:"💊", label:"Medications",     screen:"meds",      color:C.goldBright },
          { icon:"🤲", label:"PT Protocol",     screen:"pt",        color:C.goldMid },
          { icon:"❓", label:"Is This Normal?", screen:"normal",    color:C.warnLight },
        ].map(t => (
          <div key={t.screen} onClick={() => onNav(t.screen)} style={{ background:C.char, border:`1px solid ${C.iron}`, borderRadius:"3px", padding:"16px", cursor:"pointer", display:"flex", alignItems:"center", gap:"10px" }}>
            <span style={{ fontSize:"22px" }}>{t.icon}</span>
            <div style={{ fontFamily:bar, fontSize:"13px", letterSpacing:"1px", color:t.color, textTransform:"uppercase", fontWeight:"700" }}>{t.label}</div>
          </div>
        ))}
      </div>

      {/* Caregiver update */}
      <div onClick={() => onNav("caregiver")} style={{ background:C.char, border:`1px solid ${C.iron}`, borderRadius:"3px", padding:"16px", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"space-between", marginTop:"0" }}>
        <div style={{ display:"flex", alignItems:"center", gap:"10px" }}>
          <span style={{ fontSize:"22px" }}>💬</span>
          <div>
            <div style={{ fontFamily:bar, fontSize:"13px", letterSpacing:"1px", color:C.goldMid, textTransform:"uppercase", fontWeight:"700" }}>Send Caregiver Update</div>
            <div style={{ fontFamily:cor, fontSize:"12px", fontStyle:"italic", color:C.ash, marginTop:"2px" }}>Choose what to include · preview · send via text</div>
          </div>
        </div>
        <span style={{ color:C.steel, fontSize:"16px" }}>›</span>
      </div>
    </div>
  );
}

// RECOVERY
// ══════════════════════════════════════════════════════════════════════════════
function RecoveryScreen({ days, checked, onCheck, notes, onSaveNote }) {
  const phase = getPhase(days);
  const [open, setOpen] = useState(phase.id);
  const [editNote, setEditNote] = useState(null);
  const [noteDraft, setNoteDraft] = useState("");

  return (
    <div style={{ padding:"14px 14px 80px", maxWidth:640, margin:"0 auto" }}>
      <Lbl mb={12}>Recovery Phases</Lbl>
      {PHASES.map(p => {
        const isActive = p.id === phase.id, isPast = days >= p.end, isOpen = open === p.id;
        const pct = isPast ? 100 : isActive ? Math.round(((days-p.start)/(p.end-p.start))*100) : 0;
        const done = p.goals.filter((_,i) => checked[`${p.id}-${i}`]).length;
        return (
          <div key={p.id} style={{ marginBottom:"8px", border:`1px solid ${isActive?C.goldMid:isPast?`${C.gold}40`:C.iron}`, borderRadius:"3px", background:isActive?`${C.blue}20`:C.obs }}>
            <div onClick={() => setOpen(isOpen?null:p.id)} style={{ padding:"13px 14px", cursor:"pointer", display:"flex", gap:"10px", alignItems:"center", userSelect:"none" }}>
              <span style={{ fontSize:"20px" }}>{p.icon}</span>
              <div style={{ flex:1 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <span style={{ fontFamily:bb, fontSize:"18px", letterSpacing:"2px", color:isActive?C.goldBright:isPast?C.goldMid:C.bone }}>{p.name}</span>
                  <div style={{ display:"flex", gap:"6px", alignItems:"center" }}>
                    {isActive && <span style={{ fontFamily:bar, fontSize:"9px", letterSpacing:"2px", background:C.goldBright, color:C.black, padding:"2px 7px", fontWeight:700 }}>NOW</span>}
                    {isPast && <span style={{ color:C.goldMid, fontSize:"12px" }}>✓</span>}
                    <span style={{ color:C.steel, fontSize:"11px" }}>{isOpen?"▲":"▼"}</span>
                  </div>
                </div>
                <div style={{ display:"flex", gap:"8px", alignItems:"center", marginTop:"5px" }}>
                  <div style={{ flex:1, height:"2px", background:C.iron, borderRadius:"1px", overflow:"hidden" }}>
                    <div style={{ width:`${pct}%`, height:"100%", background:isPast?`linear-gradient(90deg,${C.gold},${C.goldBright})`:`linear-gradient(90deg,${C.blue},${C.goldMid})` }}/>
                  </div>
                  <span style={{ fontFamily:bar, fontSize:"9px", letterSpacing:"1px", color:C.ash, whiteSpace:"nowrap" }}>{done}/{p.goals.length} · {p.weeks}</span>
                </div>
              </div>
            </div>
            {isOpen && (
              <div style={{ padding:"0 14px 14px", borderTop:`1px solid ${C.iron}` }}>
                <div style={{ paddingTop:"12px" }}>
                  <Lbl>Goals</Lbl>
                  {p.goals.map((g,i) => {
                    const k = `${p.id}-${i}`, done = checked[k];
                    return (
                      <div key={i} onClick={() => onCheck(p.id,i)} style={{ display:"flex", gap:"10px", padding:"9px 10px", marginBottom:"3px", borderRadius:"3px", cursor:"pointer", userSelect:"none", background:done?`${C.goldDeep}20`:C.char, border:`1px solid ${done?`${C.goldMid}50`:"transparent"}` }}>
                        <div style={{ width:"15px", height:"15px", borderRadius:"2px", border:`1.5px solid ${done?C.goldBright:C.steel}`, background:done?C.goldBright:"transparent", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"10px", color:C.black, flexShrink:0, marginTop:"2px" }}>{done&&"✓"}</div>
                        <span style={{ fontSize:"15px", color:done?C.goldPale:C.bone, lineHeight:"1.4", textDecoration:done?"line-through":"none", fontFamily:cor }}>{g}</span>
                      </div>
                    );
                  })}
                  <div style={{ marginTop:"14px" }}>
                    <Lbl>Milestones</Lbl>
                    {p.milestones.map((m,i) => (
                      <div key={i} style={{ display:"flex", gap:"8px", padding:"6px 0", borderBottom:i<p.milestones.length-1?`1px solid ${C.iron}`:"none" }}>
                        <span style={{ color:C.goldMid, fontSize:"10px" }}>◆</span>
                        <span style={{ fontFamily:cor, fontSize:"13px", fontStyle:"italic", color:C.ash }}>{m}</span>
                      </div>
                    ))}
                  </div>
                  <div style={{ marginTop:"14px", display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"8px" }}>
                    <Lbl mb={0}>Notes</Lbl>
                    <Ghost onClick={() => { setEditNote(p.id); setNoteDraft(notes[p.id]||""); }} color={C.goldMid}>{notes[p.id]?"Edit":"+ Add"}</Ghost>
                  </div>
                  {editNote===p.id ? (
                    <div>
                      <TA value={noteDraft} onChange={e => setNoteDraft(e.target.value)} placeholder="PT feedback, ROM measurements, pain notes..."/>
                      <div style={{ display:"flex", gap:"8px", marginTop:"8px" }}>
                        <Btn onClick={() => { onSaveNote(p.id,noteDraft); setEditNote(null); }}>Save</Btn>
                        <Ghost onClick={() => setEditNote(null)}>Cancel</Ghost>
                      </div>
                    </div>
                  ) : notes[p.id] ? (
                    <div style={{ background:C.char, border:`1px solid ${C.iron}`, borderRadius:"3px", padding:"10px", fontFamily:cor, fontSize:"14px", fontStyle:"italic", color:C.ash, lineHeight:"1.6", whiteSpace:"pre-wrap" }}>{notes[p.id]}</div>
                  ) : (
                    <div style={{ fontFamily:cor, fontSize:"13px", fontStyle:"italic", color:C.steel }}>No notes yet.</div>
                  )}
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// MEDS
// ══════════════════════════════════════════════════════════════════════════════
function MedsScreen() {
  const [meds, setMeds] = useState(() => load("ax_meds_v2", []));
  const [timers, setTimers] = useState(() => load("ax_timers_v2", {}));
  const [now, setNow] = useState(Date.now());
  const [nm, setNm] = useState(""); const [ni, setNi] = useState(4); const [nu, setNu] = useState("hours");
  const [sleep, setSleep] = useState(() => load("ax_sleep_v2", { elevation:false, brace:false, wakeups:0 }));
  const [sleepDate, setSleepDate] = useState(() => loadRaw("ax_sleep_date_v2",""));
  useEffect(() => { const id = setInterval(() => setNow(Date.now()), 1000); return () => clearInterval(id); }, []);
  const addMed = () => {
    if (!nm.trim()) return;
    const is = ni * (nu==="hours"?3600:60);
    const m = { id:Date.now(), name:nm.trim(), intervalSec:is, unit:nu, interval:ni };
    const u = [...meds, m]; setMeds(u); save("ax_meds_v2",u); setNm(""); setNi(4); setNu("hours");
  };
  const delMed = (id) => { const u = meds.filter(m=>m.id!==id); setMeds(u); save("ax_meds_v2",u); const t={...timers}; delete t[id]; setTimers(t); save("ax_timers_v2",t); };
  const takeMed = (m) => { const ta=Date.now(); const u={...timers,[m.id]:{takenAt:ta,nextAt:ta+m.intervalSec*1000}}; setTimers(u); save("ax_timers_v2",u); };
  const today = new Date().toDateString();
  const saveSleep = () => { save("ax_sleep_v2",sleep); saveRaw("ax_sleep_date_v2",today); setSleepDate(today); };

  return (
    <div style={{ padding:"14px 14px 80px", maxWidth:640, margin:"0 auto" }}>
      {meds.length > 0 && (
        <div>
          <Lbl mb={10}>Active Medications</Lbl>
          {meds.map(m => {
            const t = timers[m.id], ta=t?.takenAt, na=t?.nextAt;
            const rem = na ? Math.max(0,Math.round((na-now)/1000)) : null;
            const elapsed = ta ? Math.round((now-ta)/1000) : null;
            const pct = ta&&na ? Math.min(100,((now-ta)/(na-ta))*100) : 0;
            const overdue = rem===0&&!!ta, warn=!overdue&&rem!==null&&rem<1800;
            const bc = overdue?C.redLight:warn?C.warnLight:C.greenLight;
            return (
              <Card key={m.id} border={overdue?`${C.redLight}60`:warn?`${C.warnLight}40`:C.iron} bg={overdue?`${C.red}20`:C.obs}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                  <div>
                    <div style={{ fontFamily:bb, fontSize:"22px", letterSpacing:"2px", color:C.white }}>💊 {m.name}</div>
                    <div style={{ fontFamily:bar, fontSize:"10px", letterSpacing:"2px", color:C.ash, textTransform:"uppercase" }}>Every {m.interval} {m.unit}</div>
                  </div>
                  <button onClick={() => delMed(m.id)} style={{ background:"transparent", border:"none", color:C.steel, cursor:"pointer", fontSize:"20px" }}>×</button>
                </div>
                {ta && (
                  <div style={{ marginTop:"14px" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", fontFamily:bar, fontSize:"10px", letterSpacing:"1px", color:C.ash, textTransform:"uppercase", marginBottom:"6px" }}>
                      <span>Taken {new Date(ta).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</span>
                      <span style={{ color:overdue?C.redLight:bc, fontWeight:overdue?"bold":"normal" }}>{overdue?"⚠️ DUE NOW":`Next ${fmtTime(rem)}`}</span>
                    </div>
                    <div style={{ height:"8px", background:C.iron, borderRadius:"2px", overflow:"hidden" }}>
                      <div style={{ width:`${pct}%`, height:"100%", background:`linear-gradient(90deg,${C.greenLight},${bc})`, transition:"width 1s linear" }}/>
                    </div>
                    <div style={{ fontFamily:bar, fontSize:"9px", letterSpacing:"1px", color:C.steel, marginTop:"4px", textTransform:"uppercase" }}>{fmtTime(elapsed)} elapsed of {fmtTime(m.intervalSec)}</div>
                  </div>
                )}
                <Btn onClick={() => takeMed(m)} full bg={overdue?C.redLight:C.goldBright} color={C.black} style={{ marginTop:"14px", fontSize:"14px", padding:"15px" }}>
                  {ta?"✓ Taken — Restart Timer":"Mark as Taken — Start Timer"}
                </Btn>
              </Card>
            );
          })}
        </div>
      )}
      <Card>
        <Lbl>Add Medication</Lbl>
        <Inp value={nm} onChange={e=>setNm(e.target.value)} placeholder="Medication name" style={{ marginBottom:"8px" }}/>
        <div style={{ display:"flex", gap:"8px", marginBottom:"12px" }}>
          <div style={{ flex:1 }}>
            <div style={{ fontFamily:bar, fontSize:"9px", letterSpacing:"2px", color:C.ash, textTransform:"uppercase", marginBottom:"5px" }}>Interval</div>
            <Inp type="number" value={ni} onChange={e=>setNi(Number(e.target.value))}/>
          </div>
          <div style={{ flex:1 }}>
            <div style={{ fontFamily:bar, fontSize:"9px", letterSpacing:"2px", color:C.ash, textTransform:"uppercase", marginBottom:"5px" }}>Unit</div>
            <select value={nu} onChange={e=>setNu(e.target.value)} style={{ width:"100%", background:C.char, border:`1px solid ${C.iron}`, borderRadius:"3px", padding:"11px 12px", color:C.white, fontSize:"15px", outline:"none" }}>
              <option value="hours">Hours</option><option value="minutes">Minutes</option>
            </select>
          </div>
        </div>
        <Btn onClick={addMed} full>+ Add Medication</Btn>
      </Card>
      <Card border={`${C.blueLight}40`}>
        <Lbl color={C.blueLight}>Sleep Log — Last Night</Lbl>
        {sleepDate===today && <div style={{ fontFamily:bar, fontSize:"9px", letterSpacing:"2px", color:C.greenLight, textTransform:"uppercase", marginBottom:"10px" }}>✓ Logged today</div>}
        {[{key:"elevation",label:"Slept with elevation",icon:"⬆️"},{key:"brace",label:"Brace on all night",icon:"🦿"}].map(item => (
          <div key={item.key} onClick={() => setSleep(s=>({...s,[item.key]:!s[item.key]}))} style={{ display:"flex", gap:"10px", padding:"10px", marginBottom:"8px", borderRadius:"3px", border:`1px solid ${sleep[item.key]?`${C.goldMid}60`:C.iron}`, background:sleep[item.key]?`${C.goldDeep}20`:C.char, cursor:"pointer", alignItems:"center", userSelect:"none" }}>
            <span style={{ fontSize:"20px" }}>{item.icon}</span>
            <span style={{ fontFamily:cor, fontSize:"15px", color:sleep[item.key]?C.white:C.ash, flex:1 }}>{item.label}</span>
            <div style={{ width:"22px", height:"22px", borderRadius:"2px", border:`1.5px solid ${sleep[item.key]?C.goldBright:C.steel}`, background:sleep[item.key]?C.goldBright:"transparent", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"11px", color:C.black, flexShrink:0 }}>{sleep[item.key]&&"✓"}</div>
          </div>
        ))}
        <div style={{ marginBottom:"12px" }}>
          <div style={{ fontFamily:bar, fontSize:"10px", letterSpacing:"2px", color:C.ash, textTransform:"uppercase", marginBottom:"8px" }}>Night Wakeups: {sleep.wakeups}</div>
          <input type="range" min="0" max="10" value={sleep.wakeups} onChange={e=>setSleep(s=>({...s,wakeups:Number(e.target.value)}))} style={{ width:"100%", accentColor:C.goldBright, height:"6px", cursor:"pointer" }}/>
          <div style={{ display:"flex", justifyContent:"space-between", fontFamily:bar, fontSize:"9px", color:C.steel, marginTop:"4px" }}><span>0 · Slept through</span><span>10 · Constant</span></div>
        </div>
        <Btn onClick={saveSleep} full bg={C.blueLight}>Save Sleep Log</Btn>
      </Card>
      <div style={{ fontFamily:cor, fontSize:"12px", fontStyle:"italic", color:C.steel, textAlign:"center", padding:"10px 0 16px", lineHeight:"1.8" }}>Follow your prescriber's instructions. This is a reminder aid only.</div>
    </div>
  );
}

// PT
// ══════════════════════════════════════════════════════════════════════════════
function PTScreen({ days, checkins, checked, wins }) {
  const phase = getPhase(days);
  const [prepOpen, setPrepOpen] = useState(false);
  const [debrief, setDebrief] = useState("");
  const [debriefs, setDebriefs] = useState(() => load("ax_debriefs_v2",[]));
  const [ptItems, setPtItems] = useState(() => load("ax_ptitems_v2",[]));
  const [newItem, setNewItem] = useState("");
  const [nextAppt, setNextAppt] = useState(() => loadRaw("ax_next_appt",""));
  const [surgeonReport, setSurgeonReport] = useState("");
  const [loadingReport, setLoadingReport] = useState(false);

  const saveDebrief = () => {
    if (!debrief.trim()) return;
    const u = [...debriefs, { id:Date.now(), text:debrief.trim(), day:days, date:new Date().toDateString() }];
    setDebriefs(u); save("ax_debriefs_v2",u); setDebrief("");
  };
  const addItem = () => {
    if (!newItem.trim()) return;
    const u = [...ptItems, { id:Date.now(), label:newItem.trim() }];
    setPtItems(u); save("ax_ptitems_v2",u); setNewItem("");
  };
  const saveAppt = (v) => { setNextAppt(v); saveRaw("ax_next_appt",v); };

  let daysUntil = null;
  if (nextAppt) { const d = new Date(nextAppt+"T12:00:00"); daysUntil = Math.ceil((d-new Date())/86400000); }

  const generateReport = async () => {
    setLoadingReport(true); setSurgeonReport("");
    const recent = checkins.slice(-14);
    const avgPain = recent.length ? Math.round(recent.reduce((a,c)=>a+c.pain,0)/recent.length*10)/10 : "no data";
    const doneGoals = phase.goals.filter((_,i) => checked[`${phase.id}-${i}`]);
    const recentWins = wins.slice(-5).map(w=>w.text).join("; ");
    const prompt = `You are helping a patient prepare a concise surgical follow-up summary for their orthopedic surgeon (Dr. Richard Myers). The patient had bilateral patellar tendon repair surgery on March 16, 2026 using suture-based transosseous repair, three bone tunnels per knee, no metal hardware. Today is Day ${days} post-op, in the ${phase.name} phase.

Recovery data:
- Average pain (last 14 days): ${avgPain}/10
- Goals completed this phase: ${doneGoals.join(", ")||"none logged"}
- Recent wins: ${recentWins||"none logged"}

Write a concise 1-page surgical visit summary. Sections: Progress Summary, Pain & Swelling, Functional Milestones, Current Concerns, Goals for Next Phase. Under 250 words. Clinical but patient-authored tone.`;
    const text = await callClaude(prompt);
    setSurgeonReport(text);
    setLoadingReport(false);
  };

  // ROM tracker — driven entirely by ROM_CONFIG
  const [romLog, setRomLog] = useState(() => load("ax_rom_v2", []));
  const initVals = () => Object.fromEntries(ROM_CONFIG.sides.map(s => [s, 0]));
  const [romVals, setRomVals] = useState(initVals);
  const [romNote, setRomNote] = useState("");

  const romTarget = ROM_CONFIG.phaseTargets[phase.id] || ROM_CONFIG.phaseTargets[5];
  const latestRom = romLog.length ? romLog[romLog.length - 1] : null;
  const allZero = ROM_CONFIG.sides.every(s => romVals[s] === 0);

  const saveRom = () => {
    const entry = { id:Date.now(), day:days, date:new Date().toDateString(), vals:{...romVals}, note:romNote.trim() };
    const u = [...romLog, entry];
    setRomLog(u); save("ax_rom_v2", u);
    setRomVals(initVals()); setRomNote("");
  };
  const delRom = (id) => { const u = romLog.filter(r => r.id !== id); setRomLog(u); save("ax_rom_v2", u); };

  const protocols = [
    { cat:"Therapeutic Exercise", icon:"🏋️", items:[{l:"Quad sets (isometric)",d:"10×3/day from Day 1 — foundational activation"},{l:"Straight leg raises",d:"With brace locked; progress to without when no lag"},{l:"Terminal knee extensions",d:"Theraband around post — key for quad re-education"},{l:"Stationary bike",d:"Begin Week 3–4, low resistance, no pain"},{l:"Eccentric decline squats",d:"Begin Week 13+ — gold standard for tendon loading"}] },
    { cat:"Neuromuscular/Balance", icon:"⚖️", items:[{l:"Single-leg stance",d:"Eyes open → closed → unstable surface"},{l:"Proprioception",d:"BOSU, wobble board — begin Week 8+"},{l:"Gait retraining",d:"Normalize mechanics early"}] },
    { cat:"Recovery Adjuncts", icon:"💉", items:[{l:"BPC-157",d:"Connective tissue repair — confirm dosing with provider"},{l:"TB-500",d:"Systemic healing peptide — coordinate with BPC-157 cycle"},{l:"Collagen + Vit C",d:"15g collagen + 50mg Vit C, 30–60 min pre-exercise"}] },
  ];

  return (
    <div style={{ padding:"14px 14px 80px", maxWidth:640, margin:"0 auto" }}>
      <Card border={`${C.goldMid}50`} bg={`${C.blue}15`}>
        <Lbl>Next Appointment</Lbl>
        <Inp type="date" value={nextAppt} onChange={e=>saveAppt(e.target.value)} style={{ marginBottom:"8px", colorScheme:"dark" }}/>
        {daysUntil !== null && (
          <div style={{ fontFamily:bb, fontSize:"22px", letterSpacing:"2px", color:daysUntil<=3?C.warnLight:C.goldBright }}>
            {daysUntil<=0?"Today":daysUntil===1?"Tomorrow":`${daysUntil} days away`}
          </div>
        )}
      </Card>

      <Card border={`${C.blueLight}50`} bg={`${C.blue}12`}>
        <Lbl color={C.blueLight}>🏥 Surgeon Visit Prep</Lbl>
        <div style={{ fontFamily:cor, fontSize:"14px", fontStyle:"italic", color:C.ash, lineHeight:"1.6", marginBottom:"14px" }}>Generate a summary of your recovery to share with Dr. Myers — built from your actual check-in data.</div>
        <Btn onClick={generateReport} full bg={C.blueLight} disabled={loadingReport}>{loadingReport?"Generating...":"Generate Visit Summary"}</Btn>
        {surgeonReport && (
          <div style={{ marginTop:"14px" }}>
            <div style={{ background:C.char, border:`1px solid ${C.iron}`, borderRadius:"3px", padding:"14px", fontFamily:cor, fontSize:"14px", color:C.bone, lineHeight:"1.8", whiteSpace:"pre-wrap" }}>{surgeonReport}</div>
            <Ghost onClick={() => navigator.clipboard?.writeText(surgeonReport)} style={{ marginTop:"8px", width:"100%", textAlign:"center" }}>Copy to Clipboard</Ghost>
          </div>
        )}
      </Card>

      <Card border={`${C.blueLight}40`} bg={`${C.blue}15`}>
        <div onClick={() => setPrepOpen(o=>!o)} style={{ cursor:"pointer", userSelect:"none", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div>
            <div style={{ fontFamily:bb, fontSize:"20px", letterSpacing:"2px", color:C.blueLight }}>📋 PT Session Prep</div>
            <div style={{ fontFamily:cor, fontSize:"13px", fontStyle:"italic", color:C.ash, marginTop:"3px" }}>What to tell your PT today</div>
          </div>
          <span style={{ color:C.steel }}>{prepOpen?"▲":"▼"}</span>
        </div>
        {prepOpen && (
          <div style={{ marginTop:"14px", borderTop:`1px solid ${C.iron}`, paddingTop:"14px" }}>
            <div style={{ fontFamily:cor, fontSize:"14px", color:C.bone, lineHeight:"1.9" }}>
              <strong style={{ color:C.blueLight, fontFamily:bar, fontSize:"10px", letterSpacing:"2px", textTransform:"uppercase" }}>Report:</strong><br/>
              • Current pain level and any sharp pain episodes<br/>
              • Swelling trend (better / same / worse)<br/>
              • Night wakeups and sleep quality<br/>
              • Any activities that increased pain<br/>
              • Goals checked off since last visit
            </div>
          </div>
        )}
      </Card>

      <Card>
        <Lbl>Session Debrief</Lbl>
        <TA value={debrief} onChange={e=>setDebrief(e.target.value)} placeholder="What your PT said today — exercises, feedback, next targets..." rows={3}/>
        <Btn onClick={saveDebrief} full style={{ marginTop:"10px" }}>Save Debrief</Btn>
        {debriefs.length > 0 && (
          <div style={{ marginTop:"14px" }}>
            {[...debriefs].reverse().slice(0,3).map((d,i) => (
              <div key={d.id} style={{ padding:"10px 0", borderTop:`1px solid ${C.iron}` }}>
                <div style={{ fontFamily:bar, fontSize:"9px", letterSpacing:"2px", color:C.steel, textTransform:"uppercase", marginBottom:"4px" }}>Day {d.day} · {d.date}</div>
                <div style={{ fontFamily:cor, fontSize:"14px", fontStyle:"italic", color:C.ash, lineHeight:"1.6" }}>{d.text}</div>
              </div>
            ))}
          </div>
        )}
      </Card>

      {/* ROM Tracker — config-driven, adapts to any surgery type */}
      <Card border={`${C.goldMid}50`}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:"4px" }}>
          <Lbl mb={2}>📐 Range of Motion</Lbl>
          <div style={{ fontFamily:bar, fontSize:"9px", letterSpacing:"1px", color:C.steel, textTransform:"uppercase", textAlign:"right" }}>
            {ACTIVE_SURGERY.short}<br/>
            {ROM_CONFIG.joint} {ROM_CONFIG.metric}
          </div>
        </div>
        <div style={{ fontFamily:cor, fontSize:"13px", fontStyle:"italic", color:C.ash, marginBottom:"14px", lineHeight:"1.6" }}>
          {ROM_CONFIG.mode === "bilateral" ? "Tracking both sides independently." : `Tracking ${ROM_CONFIG.sides[0]} ${ROM_CONFIG.joint.toLowerCase()} only.`}
          {" "}Phase target: <span style={{ color:C.goldBright, fontFamily:bar, fontSize:"13px" }}>{romTarget}{ROM_CONFIG.unit}</span>
        </div>

        {/* Latest reading gauges */}
        {latestRom && (
          <div style={{ display:"flex", gap:"8px", marginBottom:"14px" }}>
            {ROM_CONFIG.sides.map(side => {
              const val = latestRom.vals?.[side] ?? latestRom[side.toLowerCase()] ?? 0;
              const pct = Math.min(100, Math.round((val / romTarget) * 100));
              const col = pct >= 90 ? C.greenLight : pct >= 60 ? C.goldBright : C.warnLight;
              const sideColor = ROM_CONFIG.chartColors[side] || C.goldMid;
              return (
                <div key={side} style={{ flex:1, background:C.char, border:`1px solid ${C.iron}`, borderRadius:"3px", padding:"12px", textAlign:"center" }}>
                  <div style={{ fontFamily:bar, fontSize:"9px", letterSpacing:"2px", color:sideColor, textTransform:"uppercase", marginBottom:"6px" }}>
                    {ROM_CONFIG.mode === "bilateral" ? `${side} ${ROM_CONFIG.joint}` : `${side} ${ROM_CONFIG.joint}`}
                  </div>
                  <div style={{ fontFamily:bb, fontSize:"36px", letterSpacing:"2px", color:col, lineHeight:1 }}>{val}{ROM_CONFIG.unit}</div>
                  <div style={{ height:"4px", background:C.iron, borderRadius:"2px", overflow:"hidden", marginTop:"8px" }}>
                    <div style={{ width:`${pct}%`, height:"100%", background:col }}/>
                  </div>
                  <div style={{ fontFamily:bar, fontSize:"9px", letterSpacing:"1px", color:col, marginTop:"4px" }}>{pct}% of {romTarget}{ROM_CONFIG.unit} target</div>
                </div>
              );
            })}
          </div>
        )}

        {/* Sliders — one per configured side */}
        <div style={{ display:"flex", gap:"12px", marginBottom:"12px" }}>
          {ROM_CONFIG.sides.map(side => (
            <div key={side} style={{ flex:1 }}>
              <div style={{ fontFamily:bar, fontSize:"10px", letterSpacing:"2px", color:C.ash, textTransform:"uppercase", marginBottom:"6px" }}>
                {side} · <span style={{ color:ROM_CONFIG.chartColors[side] || C.goldBright }}>{romVals[side]}{ROM_CONFIG.unit}</span>
              </div>
              <input type="range"
                min={ROM_CONFIG.min} max={ROM_CONFIG.max} step={ROM_CONFIG.step}
                value={romVals[side]}
                onChange={e => setRomVals(v => ({...v, [side]: Number(e.target.value)}))}
                style={{ width:"100%", accentColor:ROM_CONFIG.chartColors[side] || C.goldBright, height:"6px", cursor:"pointer" }}
              />
              <div style={{ display:"flex", justifyContent:"space-between", fontFamily:bar, fontSize:"9px", color:C.steel, marginTop:"3px" }}>
                <span>{ROM_CONFIG.min}{ROM_CONFIG.unit}</span>
                <span>{Math.round((ROM_CONFIG.min+ROM_CONFIG.max)/2)}{ROM_CONFIG.unit}</span>
                <span>{ROM_CONFIG.max}{ROM_CONFIG.unit}</span>
              </div>
            </div>
          ))}
        </div>

        <Inp value={romNote} onChange={e => setRomNote(e.target.value)} placeholder="Optional note — pain level, session context, position used..." style={{ marginBottom:"10px" }}/>
        <Btn onClick={saveRom} full disabled={allZero}>Log ROM Reading</Btn>

        {/* History */}
        {romLog.length > 0 && (
          <div style={{ marginTop:"16px" }}>
            <div style={{ fontFamily:bar, fontSize:"10px", letterSpacing:"3px", color:C.steel, textTransform:"uppercase", marginBottom:"10px" }}>History</div>

            {/* Mini trend chart */}
            <div style={{ display:"flex", gap:"2px", alignItems:"flex-end", height:"48px", marginBottom:"6px" }}>
              {romLog.slice(-20).map((r, i) => (
                <div key={i} style={{ flex:1, display:"flex", gap:"1px", alignItems:"flex-end", minWidth:"6px" }}>
                  {ROM_CONFIG.sides.map(side => {
                    const val = r.vals?.[side] ?? r[side.toLowerCase()] ?? 0;
                    const h = Math.round((val / ROM_CONFIG.max) * 48);
                    return <div key={side} style={{ flex:1, height:`${h}px`, background:ROM_CONFIG.chartColors[side]||C.goldMid, borderRadius:"1px 1px 0 0" }}/>;
                  })}
                </div>
              ))}
            </div>

            {/* Legend — only shown for bilateral */}
            {ROM_CONFIG.mode === "bilateral" && (
              <div style={{ display:"flex", gap:"12px", fontFamily:bar, fontSize:"9px", letterSpacing:"1px", color:C.ash, textTransform:"uppercase", marginBottom:"10px" }}>
                {ROM_CONFIG.sides.map(side => (
                  <span key={side} style={{ display:"flex", alignItems:"center", gap:"4px" }}>
                    <span style={{ width:"8px", height:"8px", background:ROM_CONFIG.chartColors[side], borderRadius:"1px", display:"inline-block" }}/>
                    {side}
                  </span>
                ))}
              </div>
            )}

            {/* Log entries */}
            {[...romLog].reverse().slice(0, 5).map((r, i) => (
              <div key={r.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", padding:"8px 0", borderBottom:i<Math.min(romLog.length,5)-1?`1px solid ${C.iron}`:"none" }}>
                <div>
                  <div style={{ fontFamily:bar, fontSize:"11px", letterSpacing:"1px", color:C.bone, textTransform:"uppercase" }}>
                    {ROM_CONFIG.sides.map((side, si) => {
                      const val = r.vals?.[side] ?? r[side.toLowerCase()] ?? 0;
                      return (
                        <span key={side}>
                          {si > 0 && " · "}
                          {ROM_CONFIG.mode === "bilateral" ? `${side} ` : ""}
                          <span style={{ color:ROM_CONFIG.chartColors[side]||C.goldMid }}>{val}{ROM_CONFIG.unit}</span>
                        </span>
                      );
                    })}
                  </div>
                  <div style={{ fontFamily:bar, fontSize:"9px", letterSpacing:"1px", color:C.steel, marginTop:"3px", textTransform:"uppercase" }}>Day {r.day} · {r.date}</div>
                  {r.note ? <div style={{ fontFamily:cor, fontSize:"12px", fontStyle:"italic", color:C.ash, marginTop:"3px" }}>{r.note}</div> : null}
                </div>
                <button onClick={() => delRom(r.id)} style={{ background:"transparent", border:"none", color:C.steel, cursor:"pointer", fontSize:"16px" }}>×</button>
              </div>
            ))}
            {romLog.length > 5 && <div style={{ fontFamily:bar, fontSize:"9px", letterSpacing:"1px", color:C.steel, textAlign:"center", marginTop:"8px", textTransform:"uppercase" }}>{romLog.length - 5} more entries in history</div>}
          </div>
        )}
      </Card>

      {protocols.map((s,si) => (
        <Card key={si}>
          <div style={{ fontFamily:bb, fontSize:"18px", letterSpacing:"2px", color:C.white, marginBottom:"12px" }}>{s.icon} {s.cat}</div>
          {s.items.map((item,ii) => (
            <div key={ii} style={{ padding:"7px 0", borderBottom:ii<s.items.length-1?`1px solid ${C.iron}`:"none" }}>
              <div style={{ fontFamily:bar, fontSize:"12px", letterSpacing:"1px", color:C.goldMid, textTransform:"uppercase" }}>{item.l}</div>
              <div style={{ fontFamily:cor, fontSize:"13px", fontStyle:"italic", color:C.ash, marginTop:"2px", lineHeight:"1.5" }}>{item.d}</div>
            </div>
          ))}
        </Card>
      ))}

      <Card>
        <Lbl>My PT's Recommendations</Lbl>
        <div style={{ display:"flex", gap:"8px", marginBottom:"10px" }}>
          <Inp value={newItem} onChange={e=>setNewItem(e.target.value)} placeholder="Add exercise or recommendation..."/>
          <Btn onClick={addItem} style={{ padding:"11px 16px" }}>+</Btn>
        </div>
        {ptItems.length===0 && <div style={{ fontFamily:cor, fontSize:"13px", fontStyle:"italic", color:C.steel }}>Add PT-specific items here.</div>}
        {ptItems.map(item => (
          <div key={item.id} style={{ display:"flex", gap:"8px", padding:"8px 0", borderBottom:`1px solid ${C.iron}`, alignItems:"center" }}>
            <span style={{ color:C.goldMid, fontSize:"10px" }}>◆</span>
            <span style={{ fontFamily:cor, fontSize:"14px", color:C.bone, flex:1 }}>{item.label}</span>
            <button onClick={() => { const u=ptItems.filter(x=>x.id!==item.id); setPtItems(u); save("ax_ptitems_v2",u); }} style={{ background:"transparent", border:"none", color:C.steel, cursor:"pointer", fontSize:"18px" }}>×</button>
          </div>
        ))}
      </Card>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// SUPPORT
// ══════════════════════════════════════════════════════════════════════════════
function SupportScreen() {
  const [breathing, setBreathing] = useState(false);
  const [bPhase, setBPhase] = useState("inhale");
  const [bCount, setBCount] = useState(0);
  const [open, setOpen] = useState(null);
  const bRef = useRef(null);

  const startBreath = () => {
    setBreathing(true); setBPhase("inhale"); setBCount(0);
    let count=0, pi=0;
    const phases=["inhale","hold","exhale","hold2"], dur={inhale:4000,hold:4000,exhale:4000,hold2:4000};
    const next = () => { pi=(pi+1)%4; if(pi===0)count++; setBPhase(phases[pi]); setBCount(count); if(count<4) bRef.current=setTimeout(next,dur[phases[pi]]); else{setBreathing(false);setBPhase("inhale");} };
    bRef.current = setTimeout(next, 4000);
  };
  useEffect(() => () => { if(bRef.current) clearTimeout(bRef.current); }, []);
  const bLabel = { inhale:"Breathe In", hold:"Hold", exhale:"Breathe Out", hold2:"Hold" };
  const bColor = { inhale:C.blueLight, hold:C.steel, exhale:C.greenLight, hold2:C.steel };

  return (
    <div style={{ padding:"14px 14px 80px", maxWidth:640, margin:"0 auto" }}>
      <div style={{ textAlign:"center", padding:"10px 0 18px" }}>
        <Caduceus size={40} color={C.blueLight}/>
        <div style={{ fontFamily:bb, fontSize:"26px", letterSpacing:"4px", color:C.white, marginTop:"10px" }}>Support</div>
        <div style={{ fontFamily:cor, fontSize:"14px", fontStyle:"italic", color:C.ash, marginTop:"4px" }}>You don't have to get through this alone.</div>
      </div>

      <Card border={`${C.redLight}40`} bg={`${C.red}12`}>
        <Lbl color={C.redLight}>If You Need Help Now</Lbl>
        {[{label:"Surgeon's Line",detail:"Call your care team's after-hours line",icon:"🏥"},{label:"Your PT",detail:"Text or call — they want to know",icon:"🤲"},{label:"Crisis Line",detail:"988 — Suicide & Crisis Lifeline",icon:"💙"}].map((c,i) => (
          <div key={i} style={{ display:"flex", gap:"12px", padding:"11px 0", borderBottom:i<2?`1px solid ${C.iron}`:"none", alignItems:"center" }}>
            <span style={{ fontSize:"24px" }}>{c.icon}</span>
            <div>
              <div style={{ fontFamily:bar, fontSize:"13px", letterSpacing:"1px", color:C.white, textTransform:"uppercase" }}>{c.label}</div>
              <div style={{ fontFamily:cor, fontSize:"13px", fontStyle:"italic", color:C.ash, marginTop:"2px" }}>{c.detail}</div>
            </div>
          </div>
        ))}
      </Card>

      <Card border={`${C.blueLight}30`} bg={`${C.blue}15`}>
        <Lbl color={C.blueLight}>Read This Right Now</Lbl>
        {REASSURANCES.map((r,i) => (
          <div key={i} style={{ fontFamily:cor, fontSize:"16px", fontStyle:"italic", color:C.bone, lineHeight:"1.8", marginBottom:"14px", borderLeft:`3px solid ${C.iron}`, paddingLeft:"14px" }}>{r}</div>
        ))}
      </Card>

      <Card>
        <Lbl>Box Breathing — 4×4×4×4</Lbl>
        {!breathing ? (
          <div>
            <div style={{ fontFamily:cor, fontSize:"14px", fontStyle:"italic", color:C.ash, lineHeight:"1.7", marginBottom:"14px" }}>4 rounds of box breathing activates your parasympathetic nervous system and reduces pain perception.</div>
            <Btn onClick={startBreath} full>Start Breathing Exercise</Btn>
          </div>
        ) : (
          <div style={{ textAlign:"center", padding:"24px 0" }}>
            <div style={{ width:"100px", height:"100px", borderRadius:"50%", border:`4px solid ${bColor[bPhase]}`, margin:"0 auto 20px", display:"flex", alignItems:"center", justifyContent:"center", background:`${bColor[bPhase]}15`, transition:"all 0.5s ease" }}>
              <div style={{ fontFamily:bb, fontSize:"32px", color:bColor[bPhase] }}>4</div>
            </div>
            <div style={{ fontFamily:bb, fontSize:"28px", letterSpacing:"4px", color:bColor[bPhase] }}>{bLabel[bPhase]}</div>
            <div style={{ fontFamily:bar, fontSize:"11px", letterSpacing:"2px", color:C.ash, marginTop:"8px" }}>Round {bCount+1} of 4</div>
          </div>
        )}
      </Card>

      <Card border={`${C.warnLight}40`}>
        <Lbl color={C.warnLight}>Symptom Checker</Lbl>
        {SYMPTOM_FLAGS.map((f,i) => (
          <div key={i} style={{ display:"flex", gap:"10px", padding:"9px 0", borderBottom:i<SYMPTOM_FLAGS.length-1?`1px solid ${C.iron}`:"none", alignItems:"flex-start" }}>
            <span style={{ fontSize:"18px", flexShrink:0 }}>{f.icon}</span>
            <div>
              <div style={{ fontFamily:bar, fontSize:"12px", letterSpacing:"1px", textTransform:"uppercase", color:f.severity==="urgent"?C.redLight:f.severity==="call"?C.warnLight:C.goldMid }}>{f.label}</div>
              <div style={{ fontFamily:cor, fontSize:"13px", fontStyle:"italic", color:C.ash, marginTop:"3px", lineHeight:"1.5" }}>{f.action}</div>
            </div>
          </div>
        ))}
      </Card>
    </div>
  );
}

// NORMAL
// ══════════════════════════════════════════════════════════════════════════════
function NormalScreen() {
  const [open, setOpen] = useState(null);
  return (
    <div style={{ padding:"14px 14px 80px", maxWidth:640, margin:"0 auto" }}>
      <Card border={`${C.warnLight}50`} bg={`${C.blue}12`}>
        <div style={{ fontFamily:bb, fontSize:"22px", letterSpacing:"2px", color:C.warnLight, marginBottom:"6px" }}>❓ Is This Normal?</div>
        <div style={{ fontFamily:cor, fontSize:"14px", fontStyle:"italic", color:C.ash, lineHeight:"1.6" }}>You Googled it at 2am and found something terrifying. Stop. Read this instead.</div>
      </Card>
      {NORMAL_LIBRARY.map((item,i) => (
        <div key={i} style={{ marginBottom:"6px", border:`1px solid ${open===i?`${C.goldMid}60`:C.iron}`, borderRadius:"3px", background:open===i?`${C.blue}18`:C.obs }}>
          <div onClick={() => setOpen(open===i?null:i)} style={{ padding:"13px 14px", cursor:"pointer", display:"flex", justifyContent:"space-between", alignItems:"center", userSelect:"none" }}>
            <span style={{ fontFamily:cor, fontSize:"15px", color:open===i?C.white:C.bone, flex:1, paddingRight:"12px", lineHeight:"1.4" }}>{item.q}</span>
            <span style={{ color:C.steel, fontSize:"12px", flexShrink:0 }}>{open===i?"▲":"▼"}</span>
          </div>
          {open===i && (
            <div style={{ padding:"0 14px 14px", borderTop:`1px solid ${C.iron}` }}>
              <div style={{ fontFamily:cor, fontSize:"15px", color:C.bone, lineHeight:"1.8", paddingTop:"12px" }}>{item.a}</div>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// WIN WALL
// ══════════════════════════════════════════════════════════════════════════════
function WinWallScreen({ wins, checkins, onAddWin, onBack }) {
  const [text, setText] = useState("");
  const [search, setSearch] = useState("");
  const days = daysSince();

  const add = () => {
    if (!text.trim()) return;
    onAddWin({ text:text.trim(), day:days, date:new Date().toDateString() });
    setText("");
  };

  const sq = search.toLowerCase();
  const allEntries = [
    ...wins.map(w => ({...w, entryType:"win"})),
    ...checkins.map(c => ({ text:`Day ${c.day} · Pain ${c.pain}/10 · ${c.swelling} swelling · feeling ${c.mood}`, day:c.day, date:c.date, entryType:"checkin" }))
  ].sort((a,b) => b.day - a.day);
  const filtered = sq ? allEntries.filter(e => e.text.toLowerCase().includes(sq) || String(e.day).includes(sq)) : wins.slice().reverse().map(w=>({...w,entryType:"win"}));

  return (
    <div style={{ padding:"14px 14px 80px", maxWidth:640, margin:"0 auto" }}>
      <Ghost onClick={onBack} style={{ marginBottom:"14px" }}>← Back</Ghost>
      <Card border={`${C.goldMid}60`} bg={`${C.blue}15`}>
        <div style={{ fontFamily:bb, fontSize:"28px", letterSpacing:"3px", color:C.goldBright, marginBottom:"4px" }}>🏆 Win Wall & Journal</div>
        <div style={{ fontFamily:cor, fontSize:"14px", fontStyle:"italic", color:C.ash, lineHeight:"1.6" }}>Every win, every check-in. Searchable. Permanent.</div>
      </Card>
      <Card>
        <Lbl>Search Your Recovery Journal</Lbl>
        <Inp value={search} onChange={e=>setSearch(e.target.value)} placeholder='Try "crutches", "pain 3", "great", or a day number...'/>
        {search && <div style={{ fontFamily:bar, fontSize:"9px", letterSpacing:"2px", color:C.ash, marginTop:"8px", textTransform:"uppercase" }}>{filtered.length} results</div>}
      </Card>
      {!search && (
        <Card>
          <Lbl>Log a Win</Lbl>
          <Inp value={text} onChange={e=>setText(e.target.value)} placeholder="e.g. First quad set without pain. Slept 5 hours. Bent to 90°."/>
          <Btn onClick={add} full style={{ marginTop:"10px" }}>+ Add Win</Btn>
        </Card>
      )}
      {filtered.length === 0 ? (
        <Card><div style={{ fontFamily:cor, fontSize:"14px", fontStyle:"italic", color:C.steel, textAlign:"center", padding:"20px 0" }}>{search?"No entries match that search.":"Your wins appear here."}</div></Card>
      ) : (
        filtered.map((e,i) => (
          <div key={i} style={{ display:"flex", gap:"12px", padding:"12px", marginBottom:"8px", background:C.char, border:`1px solid ${e.entryType==="win"?C.iron:C.steel}`, borderRadius:"3px", alignItems:"flex-start" }}>
            <span style={{ fontSize:"18px", flexShrink:0 }}>{e.entryType==="win"?"🏆":"📋"}</span>
            <div>
              <div style={{ fontFamily:cor, fontSize:"14px", color:C.white, lineHeight:"1.5" }}>{e.text}</div>
              <div style={{ fontFamily:bar, fontSize:"9px", letterSpacing:"2px", color:C.steel, marginTop:"5px", textTransform:"uppercase" }}>Day {e.day} · {e.date}</div>
            </div>
          </div>
        ))
      )}
    </div>
  );
}

// WHY
// ══════════════════════════════════════════════════════════════════════════════
function WhyScreen({ wins, days, phase, checkins, checked }) {
  const [mission, setMission] = useState(() => loadRaw("ax_mission_v2",""));
  const [editM, setEditM] = useState(false);
  const [draft, setDraft] = useState("");
  const [photos, setPhotos] = useState(() => load("ax_photos_v2",[]));
  const [storageKB, setStorageKB] = useState(0);
  const [err, setErr] = useState("");
  const [weeklyReport, setWeeklyReport] = useState(() => loadRaw("ax_weekly_report",""));
  const [weeklyDate, setWeeklyDate] = useState(() => loadRaw("ax_weekly_report_date",""));
  const [loadingReport, setLoadingReport] = useState(false);
  const fileRef = useRef(null);

  const getKB = () => { try { let t=0; for(let k in localStorage){ if(localStorage.hasOwnProperty(k)) t+=(localStorage[k].length+k.length)*2; } return Math.round(t/1024); } catch{return 0;} };
  useEffect(() => setStorageKB(getKB()), [photos]);

  const saveMission = () => { setMission(draft); saveRaw("ax_mission_v2",draft); setEditM(false); };

  const handlePhoto = (e) => {
    const f = e.target.files[0]; if(!f) return; setErr("");
    if (f.size > 1.5*1024*1024) { setErr("Photo too large (max 1.5MB)."); e.target.value=""; return; }
    const r = new FileReader();
    r.onload = (ev) => {
      const url = ev.target.result;
      if (getKB()+(url.length/1024) > 4800) { setErr("Storage full. Delete some photos."); return; }
      const u = [...photos, { id:Date.now(), dataUrl:url, caption:"" }];
      setPhotos(u); save("ax_photos_v2",u);
    };
    r.readAsDataURL(f); e.target.value="";
  };
  const delPhoto = (id) => { const u=photos.filter(p=>p.id!==id); setPhotos(u); save("ax_photos_v2",u); setErr(""); };
  const updCaption = (id,cap) => { const u=photos.map(p=>p.id===id?{...p,caption:cap}:p); setPhotos(u); save("ax_photos_v2",u); };
  const moodHistory = checkins.slice(-30);

  const generateWeekly = async () => {
    setLoadingReport(true);
    const recent7 = checkins.slice(-7);
    if (recent7.length === 0) { setWeeklyReport("Log at least one check-in this week to generate your report."); setLoadingReport(false); return; }
    const avgPain = Math.round(recent7.reduce((a,c)=>a+c.pain,0)/recent7.length*10)/10;
    const moodDist = recent7.map(c=>c.mood).join(", ");
    const weekWins = wins.filter(w=>w.day>=days-7).map(w=>w.text).join("; ");
    const readiness = calcReadiness(checkins,checked,phase);
    const prompt = `You are APEXRX, a recovery companion for someone who had bilateral patellar tendon repair surgery on March 16, 2026. Today is Day ${days} post-op in the ${phase.name} phase.

This week: ${recent7.length} check-ins, average pain ${avgPain}/10, moods: ${moodDist}, wins: ${weekWins||"none"}, readiness score: ${readiness?.total||"N/A"}/100.
Their "why": ${mission||"not yet written"}.

Write a weekly recovery narrative — one beautifully written paragraph of 80–120 words. Personal, emotionally resonant, specific to this week's actual data. End with one forward-looking sentence connected to their "why." Do not use generic recovery language.`;
    const text = await callClaude(prompt);
    setWeeklyReport(text); saveRaw("ax_weekly_report",text);
    const today = new Date().toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});
    setWeeklyDate(today); saveRaw("ax_weekly_report_date",today);
    setLoadingReport(false);
  };

  return (
    <div style={{ padding:"14px 14px 80px", maxWidth:640, margin:"0 auto" }}>

      <Card border={`${C.goldMid}60`} bg={`${C.blue}15`}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:"12px" }}>
          <div>
            <Lbl mb={2}>Weekly Report</Lbl>
            <div style={{ fontFamily:bar, fontSize:"9px", letterSpacing:"1px", color:C.steel, textTransform:"uppercase" }}>{weeklyDate||"Not yet generated"}</div>
          </div>
          <Btn onClick={generateWeekly} sm bg={C.goldBright} color={C.black} disabled={loadingReport}>{loadingReport?"Writing...":"Generate"}</Btn>
        </div>
        {weeklyReport ? (
          <div style={{ fontFamily:cor, fontSize:"16px", fontStyle:"italic", color:C.white, lineHeight:"1.9", borderLeft:`3px solid ${C.goldMid}`, paddingLeft:"16px" }}>{weeklyReport}</div>
        ) : (
          <div style={{ fontFamily:cor, fontSize:"14px", fontStyle:"italic", color:C.steel, lineHeight:"1.7" }}>Your week, written from your actual data. Tap Generate.</div>
        )}
      </Card>

      <Card border={`${C.gold}50`}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"10px" }}>
          <Lbl mb={0}>My Why</Lbl>
          <Ghost onClick={() => { setDraft(mission); setEditM(true); }} color={C.goldMid}>{mission?"Edit":"+ Write Yours"}</Ghost>
        </div>
        {editM ? (
          <div>
            <TA value={draft} onChange={e=>setDraft(e.target.value)} rows={5} placeholder="What are you recovering for? The moments, the people, the life..."/>
            <div style={{ display:"flex", gap:"8px", marginTop:"10px" }}>
              <Btn onClick={saveMission} full>Save My Why</Btn>
              <Ghost onClick={() => setEditM(false)}>Cancel</Ghost>
            </div>
          </div>
        ) : mission ? (
          <div style={{ fontFamily:cor, fontSize:"17px", fontStyle:"italic", color:C.white, lineHeight:"1.8", borderLeft:`3px solid ${C.goldMid}`, paddingLeft:"16px" }}>{mission}</div>
        ) : (
          <div style={{ fontFamily:cor, fontSize:"14px", fontStyle:"italic", color:C.steel, lineHeight:"1.7" }}>Write your why — the moments, the people, the life you're climbing back to.</div>
        )}
      </Card>

      {moodHistory.length > 0 && (
        <Card>
          <Lbl>Comeback Timeline</Lbl>
          <div style={{ display:"flex", gap:"3px", alignItems:"flex-end", height:"60px", marginBottom:"8px" }}>
            {moodHistory.map((c,i) => {
              const h = c.pain<=3?8:c.pain<=6?16:c.pain<=8?24:32;
              const col = c.pain<=3?C.greenLight:c.pain<=6?C.goldMid:c.pain<=8?C.warnLight:C.redLight;
              return <div key={i} style={{ flex:1, height:`${h}px`, background:col, borderRadius:"1px", minWidth:"4px" }}/>;
            })}
          </div>
          <div style={{ display:"flex", justifyContent:"space-between", fontFamily:bar, fontSize:"9px", letterSpacing:"1px", color:C.steel, textTransform:"uppercase" }}><span>↑ High Pain</span><span>Low Pain ↓</span></div>
          <div style={{ fontFamily:cor, fontSize:"12px", fontStyle:"italic", color:C.steel, marginTop:"6px" }}>Last {moodHistory.length} check-ins. Every shorter bar is progress.</div>
        </Card>
      )}

      <Card>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"10px" }}>
          <Lbl mb={0}>My Moments</Lbl>
          <Btn onClick={() => { setErr(""); fileRef.current?.click(); }} sm>+ Photo</Btn>
        </div>
        {storageKB > 0 && (
          <div style={{ marginBottom:"10px" }}>
            <div style={{ display:"flex", justifyContent:"space-between", fontFamily:bar, fontSize:"9px", color:storageKB>4000?C.redLight:C.steel, textTransform:"uppercase", letterSpacing:"1px", marginBottom:"4px" }}><span>Storage</span><span>{storageKB}KB / 5000KB</span></div>
            <div style={{ height:"3px", background:C.iron, borderRadius:"2px", overflow:"hidden" }}>
              <div style={{ width:`${Math.min(100,(storageKB/5000)*100)}%`, height:"100%", background:storageKB>4000?C.redLight:storageKB>3000?C.warnLight:C.greenLight }}/>
            </div>
          </div>
        )}
        {err && <div style={{ background:`${C.red}20`, border:`1px solid ${C.redLight}`, borderRadius:"3px", padding:"10px 12px", marginBottom:"10px", display:"flex", justifyContent:"space-between", alignItems:"center" }}><span style={{ fontFamily:cor, fontSize:"13px", fontStyle:"italic", color:C.bone, flex:1 }}>⚠️ {err}</span><button onClick={() => setErr("")} style={{ background:"transparent", border:"none", color:C.ash, cursor:"pointer", fontSize:"16px" }}>×</button></div>}
        <input ref={fileRef} type="file" accept="image/*" onChange={handlePhoto} style={{ display:"none" }}/>
        {photos.length === 0 ? (
          <div style={{ textAlign:"center", padding:"28px 16px" }}>
            <div style={{ fontSize:"32px", opacity:0.3, marginBottom:"10px" }}>📸</div>
            <div style={{ fontFamily:cor, fontSize:"14px", fontStyle:"italic", color:C.steel, lineHeight:"1.6" }}>Add photos of the moments you're climbing back to.</div>
          </div>
        ) : (
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"8px" }}>
            {photos.map(p => (
              <div key={p.id} style={{ position:"relative", borderRadius:"3px", overflow:"hidden", border:`1px solid ${C.iron}` }}>
                <img src={p.dataUrl} alt={p.caption||"moment"} style={{ width:"100%", aspectRatio:"1", objectFit:"cover", display:"block" }}/>
                <button onClick={() => delPhoto(p.id)} style={{ position:"absolute", top:"6px", right:"6px", background:"rgba(8,12,20,0.88)", border:"none", color:C.ash, cursor:"pointer", fontSize:"14px", borderRadius:"2px", padding:"2px 7px" }}>×</button>
                <div style={{ background:"rgba(8,12,20,0.88)", padding:"6px 8px" }}>
                  <input value={p.caption} onChange={e=>updCaption(p.id,e.target.value)} placeholder="Caption..." style={{ background:"transparent", border:"none", color:C.bone, fontSize:"12px", fontFamily:cor, fontStyle:"italic", width:"100%", outline:"none", padding:0 }}/>
                </div>
              </div>
            ))}
          </div>
        )}
        {photos.length > 0 && <Ghost onClick={() => fileRef.current?.click()} style={{ width:"100%", marginTop:"10px", textAlign:"center" }}>+ Add Another</Ghost>}
      </Card>

      <Card>
        <Lbl>Win Summary</Lbl>
        <div style={{ fontFamily:bb, fontSize:"40px", letterSpacing:"3px", color:C.goldBright, textAlign:"center", marginBottom:"6px" }}>{wins.length}</div>
        <div style={{ fontFamily:cor, fontSize:"14px", fontStyle:"italic", color:C.ash, textAlign:"center" }}>wins logged so far</div>
        {wins.length > 0 && <div style={{ fontFamily:cor, fontSize:"13px", fontStyle:"italic", color:C.steel, textAlign:"center", marginTop:"8px", borderTop:`1px solid ${C.iron}`, paddingTop:"10px" }}>"{wins[wins.length-1].text}"</div>}
      </Card>
    </div>
  );
}
